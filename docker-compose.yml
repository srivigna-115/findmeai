version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: findme-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: findme

  backend:
    build: ./backend
    container_name: findme-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongodb
      - ai-service
    environment:
      NODE_ENV: production
      MONGODB_URI: mongodb://mongodb:27017/findme
      AI_SERVICE_URL: http://ai-service:5001
    env_file:
      - ./backend/.env
    volumes:
      - ./backend:/app
      - /app/node_modules

  ai-service:
    build: ./ai-service
    container_name: findme-ai-service
    restart: unless-stopped
    ports:
      - "5001:5001"
    env_file:
      - ./ai-service/.env
    volumes:
      - ./ai-service:/app
      - /app/__pycache__

  frontend:
    build: ./frontend
    container_name: findme-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://localhost:5000/api
      REACT_APP_SOCKET_URL: http://localhost:5000
    env_file:
      - ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mongodb_data:
