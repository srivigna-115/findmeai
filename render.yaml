services:
  # Backend Service
  - type: web
    name: findme-backend
    env: node
    region: oregon
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/server.js
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGODB_URI
        sync: false
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_EXPIRE
        value: 7d
      - key: BCRYPT_SALT_ROUNDS
        value: 12
      - key: AI_SERVICE_URL
        value: https://findme-ai.onrender.com
      - key: SMTP_HOST
        value: smtp.gmail.com
      - key: SMTP_PORT
        value: 587
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: EMAIL_FROM
        value: FindMe <noreply@findme.com>
      - key: IMAGE_SIMILARITY_THRESHOLD
        value: 0.78
      - key: TEXT_SIMILARITY_THRESHOLD
        value: 0.10

  # AI Service
  - type: web
    name: findme-ai
    env: python
    region: oregon
    plan: free
    rootDir: ai-service
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 1 --timeout 120 app_simple:app
    healthCheckPath: /health
    envVars:
      - key: FLASK_ENV
        value: production

  # Frontend Service
  - type: web
    name: findme-frontend
    env: static
    region: oregon
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_API_URL
        value: https://findme-backend.onrender.com/api
      - key: REACT_APP_SOCKET_URL
        value: https://findme-backend.onrender.com